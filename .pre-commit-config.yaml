# Run `pip install pre-commit && pre-commit install` once to enable these hooks.
# They run automatically on `git commit`; run all files with
# `pre-commit run --all-files`.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        name: ruff (lint + autofix)
        args: [--fix]
        files: ^(app|tests|evals)/.*\.py$
      - id: ruff-format
        name: ruff (format)
        files: ^(app|tests|evals)/.*\.py$

  - repo: local
    hooks:
      # Local/system hook (not mirrors-mypy) so mypy runs in the project venv
      # where openai/anthropic/fastapi/... are installed and their types
      # resolve — no additional_dependencies list to keep in sync. Requires
      # `pip install -r requirements-dev.txt` before `pre-commit install`.
      # mypy.ini sets the target (files = app), so filenames aren't passed.
      - id: mypy
        name: mypy (backend types)
        language: system
        entry: mypy
        files: ^app/.*\.py$
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        language: system
        entry: npm --prefix frontend run lint
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
