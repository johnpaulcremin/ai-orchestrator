# Full-stack local run:  docker compose up --build
# Backend API on :8000, UI on http://localhost:5173 (nginx proxies /api -> backend).
# Reads secrets/config from your .env (copy .env.example first).
services:
  backend:
    build: .
    env_file: .env
    environment:
      # Persist the SQLite DB on the named volume, overriding any .env value.
      DATABASE_PATH: /data/ai_orchestrator.db
      # nginx fronts the backend on this network, so per-IP rate limiting must
      # read the forwarded client IP rather than the proxy's.
      TRUST_PROXY_HEADERS: "true"
    volumes:
      - orchestrator-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  orchestrator-data:
