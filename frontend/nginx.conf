server {
    listen 80;
    server_name _;

    # Proxy API calls to the backend. The trailing slash on proxy_pass strips the
    # /api prefix, so /api/v1/... reaches the backend as /v1/... (matching the
    # Vite dev proxy).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Stream Server-Sent Events without buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    # Single-page app: serve static files, fall back to index.html.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
