[mypy]
# Static type checking for the shipped backend. Pragmatic, not --strict: the
# goal is catching real bugs (wrong attribute on a union, bad call signature)
# without a wall of "annotate everything" churn. Run: `mypy` (config picks app).
python_version = 3.11
files = app
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
check_untyped_defs = True

# python-jose ships no type stubs; it's used in a couple of well-guarded spots.
[mypy-jose.*]
ignore_missing_imports = True
